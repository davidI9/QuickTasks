 ############################################################################################
# QuickTasks Hyprland integration snippet                                                   #
# Add this to your Hyprland config to launch the widget with a keybind.                     #
# Requires make install has been run and task-calendar-launch is available in ~/.local/bin  #
############################################################################################

# Quicktasks
bind = SUPER, T, exec, ~/.local/bin/task-calendar-launch